<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#f8fbff" />
    <meta name="description" content="Soltech Energy embeddable 3D solar camera visualizer." />
    <title>Soltech Energy 3D Solar Visualizer</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <button id="visualizerLauncher" class="camera-launcher" type="button" onclick="window.openSolarVisualizer()" aria-label="Try 3D solar visualizer">
      <span class="camera-pulse"></span>
      <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M4.75 7.5h2.64l1.15-1.82A1.45 1.45 0 0 1 9.77 5h4.46c.5 0 .96.26 1.23.68l1.15 1.82h2.64c.97 0 1.75.78 1.75 1.75v8A1.75 1.75 0 0 1 19.25 19H4.75A1.75 1.75 0 0 1 3 17.25v-8c0-.97.78-1.75 1.75-1.75Zm7.25 9.2a3.95 3.95 0 1 0 0-7.9 3.95 3.95 0 0 0 0 7.9Zm0-1.7a2.25 2.25 0 1 1 0-4.5 2.25 2.25 0 0 1 0 4.5Zm5.35-5.03a.88.88 0 1 0 0-1.76.88.88 0 0 0 0 1.76Z"/></svg>
      <span class="launcher-copy">Camera</span>
    </button>

    <div id="solarVisualizer" class="visualizer" hidden>
      <div class="visualizer-stage">
        <video id="camera" autoplay muted playsinline></video>
        <canvas id="solarCanvas" aria-label="3D solar roof preview"></canvas>
        <canvas id="captureCanvas" hidden></canvas>

        <header class="ar-topbar">
          <button id="closeButton" class="icon-button" type="button" aria-label="Close visualizer">×</button>
          <div class="brand-logo-large"><img src="logo-full.png" alt="Soltech Energy" /></div>
          <button id="captureButton" class="capture-small" type="button">Save & View</button>
        </header>

        <div id="scanCard" class="scan-card"><span class="scan-dot"></span><div><b>Point camera at the roof</b><small>Drag panels with one finger. Pinch to zoom and rotate.</small></div></div>
        <div class="focus-frame" aria-hidden="true"><i></i><i></i><i></i><i></i></div>
        <section class="view-tools" aria-label="Preview tools">
          <button id="cleanViewButton" class="tool-pill" type="button" aria-pressed="false">Hide Panel</button>
          <button id="beforeAfterButton" class="tool-pill" type="button" aria-pressed="false">Before / After</button>
        </section>
        <button id="showControlsButton" class="show-controls-pill" type="button" hidden>Show Panel</button>
        <section class="adjust-panel" aria-label="Solar panel adjustment controls">
          <div class="adjust-title"><span>Adjust panels</span><button id="resetAdjustButton" type="button">Reset</button></div>
          <label>Size <input id="scaleControl" type="range" min="65" max="165" value="100" /></label>
          <label>Angle <input id="rotationControl" type="range" min="-70" max="70" value="0" /></label>
          <label>Tilt <input id="tiltControl" type="range" min="-35" max="35" value="0" /></label>
        </section>

        <footer class="ar-footer">
          <button id="whatsAppButton" class="whatsapp-button" type="button"><span class="wa-icon" aria-hidden="true"></span>Get Free Consultation</button>
        </footer>

        <section id="cameraError" class="state-panel" hidden><img src="logo-mark.png" alt="" /><h2>Camera permission needed</h2><p>Please allow camera access in Safari or Chrome, then try again.</p><button id="retryButton" class="primary-button" type="button">Open camera again</button><button id="demoButton" class="ghost-button" type="button">Preview without camera</button></section>
        <section id="feedbackDialog" class="dialog" hidden><div class="dialog-card"><button class="dialog-close" type="button" data-close-feedback>×</button><p class="eyebrow">Saved successfully</p><h2>How was your visualizer experience?</h2><div id="ratingStars" class="stars" aria-label="Rate experience"><button type="button" data-rating="1">★</button><button type="button" data-rating="2">★</button><button type="button" data-rating="3">★</button><button type="button" data-rating="4">★</button><button type="button" data-rating="5">★</button></div><textarea id="feedbackComment" rows="3" placeholder="Optional comment"></textarea><button id="submitFeedbackButton" class="primary-button" type="button">Submit feedback</button></div></section>
        <div id="toast" class="toast" role="status" aria-live="polite"></div><div id="flash" class="flash"></div>
      </div>
    </div>
    <script src="app.js"></script>
  </body>
</html>
